<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SOUL STUDIO — Tablet</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; background: #c9b7a3; min-height: 100%; }
  *, *::before, *::after { box-sizing: border-box; }
  button, input { font-family: inherit; }
  body { padding: 56px 0 72px; display: flex; justify-content: center; }

  /* iPad-style frame — 820×1180 inner */
  .ipad {
    width: 870px;          /* outer width incl. bezel */
    height: 1220px;        /* outer height */
    background: #1a1410;
    border-radius: 38px;
    padding: 22px;
    box-shadow:
      0 60px 120px rgba(35,6,11,0.30),
      0 12px 36px rgba(35,6,11,0.18),
      inset 0 0 0 1.5px rgba(255,255,255,0.06);
    position: relative;
  }
  .ipad__camera {
    position: absolute;
    top: 11px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 999px;
    background: #2a2018;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .ipad__screen {
    width: 820px; height: 1180px;
    background: var(--ivory);
    border-radius: 18px;
    overflow: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .ipad__screen::-webkit-scrollbar { width: 0; }

  /* tablet status bar inside screen */
  .ipad__statusbar {
    height: 24px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--espresso);
    background: transparent;
  }
  .ipad__statusbar svg { display: block; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shared utilities + components from website kit (responsive grids cover tablet width) -->
  <script type="text/babel" src="../website/Icon.jsx"></script>
  <script type="text/babel" src="../website/Buttons.jsx"></script>
  <script type="text/babel" src="../website/Header.jsx"></script>
  <script type="text/babel" src="../website/Hero.jsx"></script>
  <script type="text/babel" src="../website/LovingTouch.jsx"></script>
  <script type="text/babel" src="../website/Benefits.jsx"></script>
  <script type="text/babel" src="../website/HarmonyIntro.jsx"></script>
  <script type="text/babel" src="../website/AfterMassage.jsx"></script>
  <script type="text/babel" src="../website/Founder.jsx"></script>
  <script type="text/babel" src="../website/Testimonials.jsx"></script>
  <script type="text/babel" src="../website/Pricing.jsx"></script>
  <script type="text/babel" src="../website/Offer.jsx"></script>
  <script type="text/babel" src="../website/Footer.jsx"></script>

  <script type="text/babel">
    function StatusBar() {
      return (
        <div className="ipad__statusbar">
          <span>9:41</span>
          <span style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx=".6"/><rect x="4.4" y="4" width="3" height="7" rx=".6"/><rect x="8.8" y="2" width="3" height="9" rx=".6"/><rect x="13.2" y="0" width="3" height="11" rx=".6"/></svg>
            <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><path d="M7 2.5c1.7 0 3.3.6 4.5 1.7l.9-.9C11 1.8 9 1 7 1S3 1.8 1.6 3.3l.9.9C3.7 3.1 5.3 2.5 7 2.5zM7 5.4c1 0 1.9.4 2.6 1l1-1c-1-.9-2.2-1.4-3.6-1.4S4.4 4.5 3.4 5.4l1 1c.7-.6 1.6-1 2.6-1zM7 8.4a1.2 1.2 0 100 0z"/></svg>
            <span style={{ display: 'inline-block', width: 22, height: 10, border: '1.5px solid currentColor', borderRadius: 3, padding: 1.5 }}>
              <span style={{ display: 'block', width: '88%', height: '100%', background: 'currentColor', borderRadius: 1 }}></span>
            </span>
          </span>
        </div>
      );
    }

    function TabletShell() {
      return (
        <div className="ipad">
          <div className="ipad__camera"></div>
          <div className="ipad__screen">
            <StatusBar />
            <div style={{ background: 'var(--ivory)' }}>
              <Header />
              <Hero />
              <LovingTouch />
              <Benefits />
              <HarmonyIntro />
              <AfterMassage />
              <Founder />
              <Testimonials />
              <Pricing />
              <Offer />
              <Footer />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TabletShell />);
  </script>
</body>
</html>
