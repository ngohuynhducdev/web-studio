<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Voice & Tone</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .stack { display: grid; gap: 12px; }
  .row { display: flex; gap: 12px; align-items: flex-start; }
  .mark { width: 18px; flex: 0 0 auto; font-family: var(--font-display); font-size: 18px; line-height: 1; color: var(--clay); }
  .mark.do  { color: var(--deep-wine); }
  .mark.no  { color: var(--clay); text-decoration: line-through; }
  .text { font-family: var(--font-display); font-size: 18px; line-height: 1.25; }
  .text.no { color: var(--clay); text-decoration: line-through; text-decoration-color: rgba(35,6,11,.25); font-style: italic; font-family: var(--font-body); font-size: 14px; }
  .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--clay); }
</style>
</head>
<body>
  <div class="lbl">Voice — slow, sensory, second-person</div>
  <div class="stack" style="margin-top:10px">
    <div class="row"><div class="mark do">+</div><div class="text">Immerse <em>Yourself</em> In The Atmosphere Of Thai Relaxation.</div></div>
    <div class="row"><div class="mark do">+</div><div class="text">A place where stress fades and harmony begins.</div></div>
    <div class="row"><div class="mark no">×</div><div class="text no">Book now — limited slots! 🌿✨</div></div>
  </div>
</body>
</html>
