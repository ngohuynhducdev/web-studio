<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type Pairing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px 24px; background: var(--ivory); color: var(--espresso); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: end; }
  .specimen { font-weight: 500; line-height: 1; }
  .serif    { font-family: var(--font-display); font-size: 120px; }
  .sans     { font-family: var(--font-body); font-size: 120px; font-weight: 600; }
  .name     { margin-top: 12px; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--clay); }
  .label    { font-family: var(--font-display); font-size: 14px; color: var(--bark); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="specimen serif">Aa</div>
      <div class="label">Playfair Display</div>
      <div class="name">Display · Headings · Italic flourish</div>
    </div>
    <div>
      <div class="specimen sans">Aa</div>
      <div class="label">Source Sans 3</div>
      <div class="name">Body · UI · Eyebrow</div>
    </div>
  </div>
</body>
</html>
