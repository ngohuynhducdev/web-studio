<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px 22px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; font-size: 13px; }
  .tok { width: 38px; color: var(--clay); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .bar { background: var(--deep-wine); height: 8px; border-radius: 999px; }
  .val { margin-left: auto; color: var(--bark); font-family: var(--font-display); font-size: 14px; }
</style>
</head>
<body>
  <div class="row"><div class="tok">s-1</div><div class="bar" style="width:4px"></div><div class="val">4 px</div></div>
  <div class="row"><div class="tok">s-2</div><div class="bar" style="width:8px"></div><div class="val">8 px</div></div>
  <div class="row"><div class="tok">s-3</div><div class="bar" style="width:12px"></div><div class="val">12 px</div></div>
  <div class="row"><div class="tok">s-4</div><div class="bar" style="width:16px"></div><div class="val">16 px</div></div>
  <div class="row"><div class="tok">s-5</div><div class="bar" style="width:24px"></div><div class="val">24 px</div></div>
  <div class="row"><div class="tok">s-6</div><div class="bar" style="width:32px"></div><div class="val">32 px</div></div>
  <div class="row"><div class="tok">s-7</div><div class="bar" style="width:48px"></div><div class="val">48 px</div></div>
  <div class="row"><div class="tok">s-8</div><div class="bar" style="width:64px"></div><div class="val">64 px</div></div>
  <div class="row"><div class="tok">s-9</div><div class="bar" style="width:96px"></div><div class="val">96 px</div></div>
  <div class="row"><div class="tok">s-10</div><div class="bar" style="width:128px"></div><div class="val">128 px</div></div>
</body>
</html>
