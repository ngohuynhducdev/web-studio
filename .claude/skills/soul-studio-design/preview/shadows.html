<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shadows / Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--sand-beige); font-family: var(--font-body); color: var(--espresso); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card { background: var(--ivory); border-radius: var(--r-lg); padding: 20px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; }
  .t  { font-family: var(--font-display); font-size: 18px; }
  .m  { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--clay); }
  .s1 { box-shadow: var(--shadow-1); }
  .s2 { box-shadow: var(--shadow-2); }
  .s3 { box-shadow: var(--shadow-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="card s1"><div class="t">Hairline</div><div class="m">shadow-1</div></div>
    <div class="card s2"><div class="t">Card lift</div><div class="m">shadow-2</div></div>
    <div class="card s3"><div class="t">Elevated</div><div class="m">shadow-3</div></div>
  </div>
</body>
</html>
