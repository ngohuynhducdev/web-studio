<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Header / Wordmark Nav</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    background: var(--ivory);
    border-radius: var(--r-pill);
    box-shadow: var(--shadow-1);
  }
  .wm { font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: 0.22em; }
  .links { display: flex; gap: 28px; font-size: 13px; color: var(--bark); }
  .links a { text-decoration: none; color: inherit; }
  .hamburger {
    width: 44px; height: 44px; border-radius: 999px; background: var(--espresso);
    color: var(--ivory); display: flex; align-items: center; justify-content: center;
    margin-left: 14px;
  }
  svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="nav">
    <div class="wm">SOUL&nbsp;&nbsp;STUDIO</div>
    <div class="links">
      <a href="#">Experience</a>
      <a href="#">Services</a>
      <a href="#">About</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </div>
    <div class="hamburger"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></div>
  </div>
</body>
</html>
