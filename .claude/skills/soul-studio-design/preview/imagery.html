<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Imagery direction</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 14px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 8px; height: 220px; }
  .frame { border-radius: var(--r-md); background-size: cover; background-position: center; overflow: hidden; }
  .a { background-image: url('../assets/moodboard/laptop-loving-touch.webp'); background-position: center 55%; }
  .b { background-image: url('../assets/moodboard/hero-laptop-meditation.webp'); background-position: 55% 45%; }
  .c { background-image: url('../assets/moodboard/tablet-after-massage.webp'); background-position: 55% 55%; }
  .cap { margin-top: 10px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--clay); }
</style>
</head>
<body>
  <div class="grid">
    <div class="frame a"></div>
    <div class="frame b"></div>
    <div class="frame c"></div>
  </div>
  <div class="cap">Warm · Candlelit · Tactile · Close-up · Never cool · Never grayscale</div>
</body>
</html>
