<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .box { background: var(--sand-beige); aspect-ratio: 1.05 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark); }
  .v { font-family: var(--font-display); font-size: 14px; letter-spacing: 0; text-transform: none; color: var(--espresso); }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius: var(--r-xs)"><div class="v">6</div>xs</div>
    <div class="box" style="border-radius: var(--r-sm)"><div class="v">10</div>sm</div>
    <div class="box" style="border-radius: var(--r-md)"><div class="v">16</div>md</div>
    <div class="box" style="border-radius: var(--r-lg)"><div class="v">24</div>lg</div>
    <div class="box" style="border-radius: var(--r-xl)"><div class="v">36</div>xl</div>
    <div class="box" style="border-radius: var(--r-pill)"><div class="v">∞</div>pill</div>
  </div>
</body>
</html>
