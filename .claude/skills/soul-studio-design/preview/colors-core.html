<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Core Palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--ivory); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw  { border-radius: 14px; padding: 14px; height: 158px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-1); }
  .sw .name { font-family: var(--font-display); font-size: 16px; line-height: 1.1; }
  .sw .hex  { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: .7; }
  .sw .lbl  { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
  .ivory    { background: var(--ivory);      color: var(--espresso); border: 1px solid var(--border); }
  .sand     { background: var(--sand-beige); color: var(--espresso); }
  .wine     { background: var(--deep-wine);  color: var(--ivory); }
  .espresso { background: var(--espresso);   color: var(--ivory); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw ivory"><div class="lbl">Ivory</div><div><div class="name">Page</div><div class="hex">#FFF8F1</div></div></div>
    <div class="sw sand"><div class="lbl">Sand Beige</div><div><div class="name">Surface</div><div class="hex">#E3D4C5</div></div></div>
    <div class="sw wine"><div class="lbl">Deep Wine</div><div><div class="name">Action</div><div class="hex">#23060B</div></div></div>
    <div class="sw espresso"><div class="lbl">Espresso</div><div><div class="name">Text / Deep</div><div class="hex">#1D110C</div></div></div>
  </div>
</body>
</html>
