<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SOUL STUDIO — Logo / Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--ivory);
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .wm {
    text-align: center;
    color: var(--espresso);
  }
  .wm__name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    line-height: 1;
  }
  .wm__rule {
    display: block;
    width: 96px;
    height: 1px;
    background: var(--espresso);
    margin: 12px auto;
    opacity: 0.5;
  }
  .wm__tag {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 16px;
    color: var(--bark);
  }
</style>
</head>
<body>
  <div class="wm">
    <div class="wm__name">SOUL&nbsp;&nbsp;STUDIO</div>
    <span class="wm__rule"></span>
    <div class="wm__tag">Thai Massage</div>
  </div>
</body>
</html>
