<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Extended Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw  { border-radius: 12px; padding: 12px; height: 134px; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: var(--shadow-1); }
  .sw .name { font-family: var(--font-display); font-size: 14px; line-height: 1.1; }
  .sw .hex  { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; opacity: .7; margin-top: 2px; }
  .s1 { background: var(--ivory-soft); border: 1px solid var(--border); }
  .s2 { background: var(--sand-light); }
  .s3 { background: var(--sand-deep);  color: var(--espresso); }
  .s4 { background: var(--clay);       color: var(--ivory); }
  .s5 { background: var(--bark);       color: var(--ivory); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw s1"><div class="name">Ivory Soft</div><div class="hex">#FBF1E5</div></div>
    <div class="sw s2"><div class="name">Sand Light</div><div class="hex">#EFE3D6</div></div>
    <div class="sw s3"><div class="name">Sand Deep</div><div class="hex">#D2BFAB</div></div>
    <div class="sw s4"><div class="name">Clay</div><div class="hex">#9E8472</div></div>
    <div class="sw s5"><div class="name">Bark</div><div class="hex">#5C453A</div></div>
  </div>
</body>
</html>
