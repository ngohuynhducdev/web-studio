<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Heading Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: var(--ivory); color: var(--espresso); font-family: var(--font-body); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 4px 0; }
  .row + .row { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 10px; }
  .label { width: 64px; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--clay); }
  .sample { font-family: var(--font-display); font-weight: 500; line-height: 1.05; }
  .meta { margin-left: auto; font-size: 11px; color: var(--clay); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row"><div class="label">H1</div><div class="sample" style="font-size:48px">A Place Where Stress Fades</div><div class="meta">Playfair · 48px</div></div>
  <div class="row"><div class="label">H2</div><div class="sample" style="font-size:32px">After Your Massage</div><div class="meta">Playfair · 32px</div></div>
  <div class="row"><div class="label">H3</div><div class="sample" style="font-size:22px">Loving Through Touch</div><div class="meta">Playfair · 22px</div></div>
  <div class="row"><div class="label">H4</div><div class="sample" style="font-size:18px;font-weight:500">Studio Founder</div><div class="meta">Playfair · 18px</div></div>
</body>
</html>
