<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Form Fields</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--sand-beige); font-family: var(--font-body); color: var(--espresso); }
  .stack { display: grid; gap: 12px; max-width: 380px; }
  .field {
    height: 50px;
    border-radius: var(--r-pill);
    background: var(--ivory);
    border: 1px solid transparent;
    padding: 0 22px;
    display: flex; align-items: center;
    font-family: var(--font-body); font-size: 15px;
    color: var(--clay);
    transition: border-color var(--t-base) var(--ease-out);
  }
  .field--filled { color: var(--espresso); }
  .field--focus  { border-color: var(--espresso); color: var(--espresso); }
  .field--focus::after { content: "|"; color: var(--espresso); margin-left: 2px; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="stack">
    <div class="field">Name*</div>
    <div class="field field--filled">sophia@soulstudio.co</div>
    <div class="field field--focus">+1 555 0193</div>
  </div>
</body>
</html>
