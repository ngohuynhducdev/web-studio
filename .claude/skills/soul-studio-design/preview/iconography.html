<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--ivory); font-family: var(--font-body); color: var(--espresso); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 6px; }
  .ic   { width: 24px; height: 24px; }
  .ic svg { width: 100%; height: 100%; }
  .nm   { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--clay); }
  .note { margin-top: 16px; font-size: 11px; color: var(--clay); letter-spacing: 0.04em; text-align: right; }
  .note b { color: var(--bark); font-weight: 600; }
</style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <div class="note">Lucide · <b>1.5–1.75px stroke</b> · uses <b>currentColor</b></div>
  <script>
    const names = ['menu','arrow-up-right','arrow-right','calendar','clock','heart','star','phone','mail','map-pin','chevron-down','user','check','plus','instagram','facebook'];
    const g = document.getElementById('grid');
    Promise.all(names.map(n => fetch('../assets/icons/' + n + '.svg').then(r => r.text()).then(t => [n, t]))).then(rows => {
      rows.forEach(([n, t]) => {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerHTML = '<div class="ic">' + t + '</div><div class="nm">' + n + '</div>';
        g.appendChild(el);
      });
    });
  </script>
</body>
</html>
