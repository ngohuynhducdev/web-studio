<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Testimonial Card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--sand-beige); font-family: var(--font-body); color: var(--espresso); }
  .card {
    background: var(--ivory);
    border-radius: var(--r-lg);
    padding: 18px;
    max-width: 320px;
    box-shadow: var(--shadow-1);
  }
  .hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .av { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg,#9c7a5e,#3c2618); }
  .nm { font-family: var(--font-body); font-size: 13px; font-weight: 600; }
  .q  { font-size: 13px; line-height: 1.55; color: var(--bark); text-wrap: pretty; }
</style>
</head>
<body>
  <div class="card">
    <div class="hd">
      <div class="av"></div>
      <div class="nm">Anna M.</div>
    </div>
    <div class="q">Sofya is an amazing specialist. After her massage, my body thanks me for a whole week, and I also notice it becoming stronger. I love visiting Sonya — it's pure bliss.</div>
  </div>
</body>
</html>
