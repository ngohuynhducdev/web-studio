<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pricing Card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--sand-beige); font-family: var(--font-body); color: var(--espresso); }
  .card {
    background: var(--ivory);
    border-radius: var(--r-lg);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow-2);
    max-width: 320px;
  }
  .name   { text-align: center; font-size: 13px; color: var(--bark); letter-spacing: 0.04em; }
  .price  { text-align: center; font-family: var(--font-display); font-size: 32px; font-weight: 500; margin: 2px 0 14px; }
  .rule   { height: 1px; background: var(--border); margin: 0 0 12px; }
  ul      { list-style: none; padding: 0; margin: 0 0 14px; display: grid; gap: 6px; }
  li      { font-size: 13px; color: var(--bark); display: flex; gap: 8px; align-items: center; }
  li::before { content: ""; width: 9px; height: 9px; border-radius: 999px; border: 1px solid var(--border-strong); flex: 0 0 auto; }
  li.dim  { color: var(--clay); }
  li.dim::before { opacity: .5; }
  .cta {
    display: flex; justify-content: center;
  }
  button.ss-btn { background: var(--deep-wine); }
  svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="card">
    <div class="name">Standart Plan</div>
    <div class="price">$85 / session</div>
    <div class="rule"></div>
    <ul>
      <li>90-minute Traditional Massage</li>
      <li>Aromatic oils</li>
      <li>Hot herbal compress</li>
      <li>Foot reflexology (15 min)</li>
      <li class="dim">Hot stone therapy</li>
    </ul>
    <div class="cta">
      <button class="ss-btn">
        <span class="ss-btn__dot"><svg viewBox="0 0 24 24"><path d="M7 17l10-10M9 7h8v8"/></svg></span>
        Book Your Massage
      </button>
    </div>
  </div>
</body>
</html>
