  <rect x="128" y="344" width="38" height="20" rx="2" fill="#1a1816" opacity="0.75"/>
  <rect x="128" y="368" width="80" height="6" rx="3" fill="#7a7570" opacity="0.4"/>
  <rect x="225" y="344" width="1" height="36" fill="#e0dad3"/>
