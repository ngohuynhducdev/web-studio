  <rect x="0" y="59" width="480" height="1" fill="#e0dad3"/>
  <!-- Logo text blocks -->
  <rect x="32" y="22" width="54" height="8" rx="3" fill="#1a1816" opacity="0.8"/>
  <circle cx="94" cy="26" r="2.5" fill="#8c6e54"/>
  <rect x="102" y="22" width="90" height="8" rx="3" fill="#1a1816" opacity="0.35"/>
  <!-- Nav links -->
  <rect x="200" y="26" width="36" height="6" rx="3" fill="#7a7570" opacity="0.5"/>
  <rect x="250" y="26" width="42" height="6" rx="3" fill="#7a7570" opacity="0.5"/>
  <rect x="306" y="26" width="36" height="6" rx="3" fill="#7a7570" opacity="0.5"/>
  <!-- CTA pill -->
  <rect x="388" y="18" width="72" height="26" fill="#8c6e54"/>
  <rect x="400" y="25" width="48" height="6" rx="3" fill="rgba(255,255,255,0.85)"/>

  <!-- Hero left content -->
  <!-- Eyebrow rule + text -->
  <rect x="32" y="86" width="28" height="1" fill="#8c6e54"/>
  <rect x="68" y="82" width="130" height="8" rx="3" fill="#8c6e54" opacity="0.4"/>

  <!-- Headline "trở về với" — thin Fraunces style -->
  <rect x="32" y="104" width="200" height="32" rx="3" fill="#1a1816" opacity="0.82"/>
  <!-- "khoảng lặng" -->
  <rect x="32" y="144" width="260" height="32" rx="3" fill="#1a1816" opacity="0.82"/>
  <!-- "của bạn." italic + earth -->
  <rect x="32" y="184" width="180" height="32" rx="3" fill="#8c6e54" opacity="0.75"/>

  <!-- Sub text -->
  <rect x="32" y="232" width="280" height="7" rx="3" fill="#7a7570" opacity="0.45"/>
  <rect x="32" y="245" width="250" height="7" rx="3" fill="#7a7570" opacity="0.35"/>
  <rect x="32" y="258" width="230" height="7" rx="3" fill="#7a7570" opacity="0.28"/>

