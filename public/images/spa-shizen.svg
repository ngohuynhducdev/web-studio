  <rect x="238" y="368" width="60" height="6" rx="3" fill="#7a7570" opacity="0.4"/>

  <!-- Trust bar strip -->
  <rect x="0" y="420" width="480" height="44" fill="none" stroke="#e0dad3" stroke-width="1" y="419"/>
  <rect x="0" y="420" width="480" height="44" fill="rgba(224,218,211,0.18)"/>
  <rect x="32" y="434" width="90" height="6" rx="3" fill="#7a7570" opacity="0.4"/>
  <circle cx="134" cy="437" r="2" fill="#8c6e54" opacity="0.4"/>
  <rect x="144" y="434" width="80" height="6" rx="3" fill="#7a7570" opacity="0.4"/>
  <circle cx="236" cy="437" r="2" fill="#8c6e54" opacity="0.4"/>
  <rect x="246" y="434" width="96" height="6" rx="3" fill="#7a7570" opacity="0.4"/>
  <circle cx="354" cy="437" r="2" fill="#8c6e54" opacity="0.4"/>
  <rect x="364" y="434" width="80" height="6" rx="3" fill="#7a7570" opacity="0.4"/>

  <!-- Services list preview (bottom) -->
  <rect x="32" y="484" width="400" height="1" fill="#e0dad3"/>
  <rect x="32" y="502" width="18" height="6" rx="2" fill="#8c6e54" opacity="0.5"/>
  <rect x="60" y="502" width="100" height="6" rx="3" fill="#1a1816" opacity="0.55"/>
  <rect x="362" y="499" width="56" height="10" rx="3" fill="#8c6e54" opacity="0.25"/>
  <rect x="32" y="524" width="400" height="1" fill="#e0dad3"/>
  <rect x="32" y="540" width="18" height="6" rx="2" fill="#8c6e54" opacity="0.5"/>
  <rect x="60" y="540" width="120" height="6" rx="3" fill="#1a1816" opacity="0.55"/>
  <rect x="354" y="537" width="64" height="10" rx="3" fill="#8c6e54" opacity="0.25"/>
