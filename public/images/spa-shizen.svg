<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <linearGradient id="szBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f7f5"/>
      <stop offset="100%" style="stop-color:#f0ebe3"/>
    </linearGradient>
    <linearGradient id="szPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c7b60"/>
      <stop offset="100%" style="stop-color:#7a5c42"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="url(#szBg)"/>

  <!-- Right earth panel -->
  <rect x="480" y="0" width="320" height="560" fill="url(#szPanel)" opacity="0.92"/>

  <!-- Panel inner border -->
  <rect x="504" y="24" width="272" height="512" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Circle in panel -->
  <circle cx="640" cy="280" r="110" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="640" cy="280" r="80" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="640" cy="280" r="48" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <!-- Leaf emoji hint -->
  <text x="616" y="292" font-size="28" opacity="0.55">🌿</text>

  <!-- Panel "est. 2016" label -->
  <rect x="604" y="388" width="72" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Navbar -->
