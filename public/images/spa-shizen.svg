  <rect x="32" y="344" width="30" height="20" rx="2" fill="#1a1816" opacity="0.75"/>
  <rect x="32" y="368" width="72" height="6" rx="3" fill="#7a7570" opacity="0.4"/>
  <rect x="1" y="344" width="1" height="36" fill="#e0dad3" x="115"/>
