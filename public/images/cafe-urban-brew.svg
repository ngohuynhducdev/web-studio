<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <linearGradient id="ubBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e0d"/>
      <stop offset="100%" style="stop-color:#1a1917"/>
    </linearGradient>
    <radialGradient id="ubGlow1" cx="75%" cy="20%" r="45%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ubGlow2" cx="30%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#ff6240;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ff6240;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ubCupGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0.03"/>
    </radialGradient>
    <filter id="ubGlowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="url(#ubBg)"/>
  <rect width="800" height="560" fill="url(#ubGlow1)"/>
  <rect width="800" height="560" fill="url(#ubGlow2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="560" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="560" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="560" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Nav bar -->
  <rect x="32" y="24" width="736" height="44" rx="10" fill="rgba(26,25,23,0.9)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Logo -->
  <rect x="56" y="38" width="90" height="12" rx="4" fill="#f5c842" opacity="0.9"/>
  <rect x="150" y="38" width="6" height="12" rx="2" fill="#f5c842" opacity="0.5"/>
  <rect x="160" y="38" width="70" height="12" rx="4" fill="#f5c842" opacity="0.9"/>
  <!-- Nav links -->
  <rect x="310" y="42" width="44" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="370" y="42" width="60" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="446" y="42" width="50" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="512" y="42" width="54" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
  <!-- CTA pill -->
  <rect x="638" y="33" width="96" height="28" rx="14" fill="#f5c842"/>
  <rect x="652" y="42" width="68" height="8" rx="4" fill="#0f0e0d" opacity="0.8"/>

  <!-- Hero headline — big bold text blocks -->
  <rect x="56" y="92" width="22" height="22" rx="11" fill="#f5c842"/>
  <rect x="84" y="98" width="140" height="10" rx="4" fill="rgba(255,255,255,0.22)"/>

  <!-- "NĂNG" - massive -->
  <rect x="56" y="128" width="280" height="54" rx="6" fill="#f0ece5" opacity="0.95"/>
  <!-- "LƯỢNG" -->
  <rect x="56" y="190" width="320" height="54" rx="6" fill="#f0ece5" opacity="0.95"/>
  <!-- italic "cho mọi" -->
  <rect x="56" y="252" width="200" height="36" rx="5" fill="#f5c842" opacity="0.5"/>
  <!-- "NGÀY." accent -->
  <rect x="56" y="296" width="240" height="54" rx="6" fill="#f5c842" opacity="0.95"/>

  <!-- Sub text lines -->
  <rect x="56" y="364" width="280" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="56" y="378" width="250" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>

  <!-- CTA buttons -->
  <rect x="56" y="402" width="130" height="38" rx="19" fill="#f5c842"/>
  <rect x="72" y="417" width="96" height="8" rx="4" fill="#0f0e0d" opacity="0.8"/>
  <rect x="200" y="402" width="140" height="38" rx="19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="216" y="417" width="108" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Stats -->
  <rect x="56" y="454" width="48" height="16" rx="4" fill="#f5c842" opacity="0.9"/>
  <rect x="56" y="475" width="72" height="7" rx="3.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="156" y="454" width="36" height="16" rx="4" fill="#f5c842" opacity="0.9"/>
  <rect x="156" y="475" width="72" height="7" rx="3.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="256" y="454" width="30" height="16" rx="4" fill="#f5c842" opacity="0.9"/>
  <rect x="256" y="475" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Separators -->
  <rect x="140" y="458" width="1" height="28" fill="rgba(255,255,255,0.1)"/>
  <rect x="240" y="458" width="1" height="28" fill="rgba(255,255,255,0.1)"/>

  <!-- Hero right — circular visual -->
  <circle cx="596" cy="300" r="155" fill="url(#ubCupGlow)" filter="url(#ubGlowFilter)"/>
  <circle cx="596" cy="300" r="170" fill="none" stroke="rgba(245,200,66,0.12)" stroke-width="1" stroke-dasharray="8 6"/>
  <circle cx="596" cy="300" r="135" fill="none" stroke="rgba(245,200,66,0.1)" stroke-width="1"/>
  <!-- Cup body -->
  <rect x="556" y="278" width="80" height="52" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(245,200,66,0.25)" stroke-width="1.5"/>
  <!-- Cup handle -->
  <path d="M636 290 Q656 290 656 305 Q656 320 636 320" fill="none" stroke="rgba(245,200,66,0.25)" stroke-width="2"/>
  <!-- Steam -->
  <path d="M574 272 Q578 262 574 252" fill="none" stroke="rgba(245,200,66,0.35)" stroke-width="2" stroke-linecap="round"/>
  <path d="M588 268 Q592 256 588 244" fill="none" stroke="rgba(245,200,66,0.35)" stroke-width="2" stroke-linecap="round"/>
  <path d="M602 272 Q606 260 602 250" fill="none" stroke="rgba(245,200,66,0.3)" stroke-width="2" stroke-linecap="round"/>
  <!-- Saucer -->
  <ellipse cx="596" cy="332" rx="52" ry="7" fill="rgba(245,200,66,0.15)"/>
  <!-- Floating elements -->
  <text x="460" y="180" font-size="18" opacity="0.5" fill="#f5c842">✦</text>
  <text x="710" y="230" font-size="16" opacity="0.5">🫧</text>
  <text x="465" y="400" font-size="16" opacity="0.45">🍃</text>
  <text x="718" y="380" font-size="14" opacity="0.5" fill="#f5c842">⚡</text>

  <!-- Marquee strip at bottom -->
  <rect x="0" y="510" width="800" height="38" fill="#f5c842"/>
  <!-- Marquee text items -->
  <rect x="32" y="522" width="110" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
  <circle cx="156" cy="527" r="3" fill="#0f0e0d" opacity="0.35"/>
  <rect x="170" y="522" width="80" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
  <circle cx="264" cy="527" r="3" fill="#0f0e0d" opacity="0.35"/>
  <rect x="278" y="522" width="96" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
  <circle cx="388" cy="527" r="3" fill="#0f0e0d" opacity="0.35"/>
  <rect x="402" y="522" width="90" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
  <circle cx="506" cy="527" r="3" fill="#0f0e0d" opacity="0.35"/>
  <rect x="520" y="522" width="110" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
  <circle cx="644" cy="527" r="3" fill="#0f0e0d" opacity="0.35"/>
  <rect x="658" y="522" width="110" height="10" rx="4" fill="#0f0e0d" opacity="0.65"/>
</svg>
