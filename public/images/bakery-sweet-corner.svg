  <ellipse cx="680" cy="80" rx="180" ry="160" fill="#ffb3d0" opacity="0.3" transform="rotate(-20 680 80)"/>
  <ellipse cx="100" cy="450" rx="150" ry="130" fill="#ffd6e8" opacity="0.35" transform="rotate(15 100 450)"/>
  <ellipse cx="750" cy="420" rx="100" ry="90" fill="#ffbfd8" opacity="0.25"/>

  <!-- Floating decorative dots -->
  <circle cx="60" cy="100" r="6" fill="#e8608c" opacity="0.3"/>
